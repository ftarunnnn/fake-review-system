<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local Mock Review System</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f3f4f6;
            margin: 0;
            padding: 2rem;
            color: #1f2937;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        .review-card {
            background: white;
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .review-header {
            display: flex;
            align-items: center;
            margin-bottom: 1rem;
        }
        .avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            margin-right: 1rem;
            object-fit: cover;
        }
        .stars {
            color: #fbbf24;
            font-size: 1.2rem;
            margin-bottom: 0.5rem;
        }
        .review-text {
            line-height: 1.6;
            margin-bottom: 1rem;
        }
        .photos-grid {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .review-photo {
            width: 120px;
            height: 120px;
            object-fit: cover;
            border-radius: 4px;
            border: 1px solid #e5e7eb;
        }
        .meta-data {
            font-size: 0.85rem;
            color: #6b7280;
            margin-top: 1rem;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Customer Reviews (Local Environment)</h2>
    <div id="reviews-container">
        <p>Loading reviews from local API...</p>
    </div>
</div>

<script>
    const API_URL = 'http://localhost:3000/api/reviews?limit=10';

    function getStars(rating) {
        return '★'.repeat(rating) + '☆'.repeat(5 - rating);
    }

    async function fetchReviews() {
        try {
            const response = await fetch(API_URL);
            const data = await response.json();
            
            const container = document.getElementById('reviews-container');
            container.innerHTML = '';

            data.reviews.forEach(review => {
                const photosHtml = review.photos.map(photoUrl => 
                    `<img src="${photoUrl}" class="review-photo" alt="Customer product photo">`
                ).join('');

                const dateString = new Date(review.createdAt).toLocaleDateString();

                const cardHtml = `
                    <div class="review-card">
                        <div class="review-header">
                            <img src="${review.avatarUrl}" class="avatar" alt="${review.username}'s avatar">
                            <div>
                                <strong>${review.username}</strong>
                                <div class="stars">${getStars(review.rating)}</div>
                            </div>
                        </div>
                        <div class="review-text">
                            ${review.reviewText}
                        </div>
                        ${review.photos.length > 0 ? `<div class="photos-grid">${photosHtml}</div>` : ''}
                        <div class="meta-data">Reviewed on ${dateString}</div>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', cardHtml);
            });

        } catch (error) {
            document.getElementById('reviews-container').innerHTML = 
                `<p style="color: red;">Error fetching reviews. Make sure your Node.js server (server.js) is running on port 3000.</p>`;
            console.error('Error:', error);
        }
    }

    fetchReviews();
</script>

</body>
</html>
